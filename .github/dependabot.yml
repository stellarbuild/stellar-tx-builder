version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      # Group all TypeScript-related updates together
      typescript-ecosystem:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "ts-*"
      # Group all Jest/testing updates together
      testing:
        patterns:
          - "jest"
          - "@types/jest"
          - "ts-jest"
      # Group all linting/formatting updates together
      linting-formatting:
        patterns:
          - "eslint"
          - "eslint-*"
          - "prettier"
    ignore:
      # Do not auto-update the Stellar SDK major versions — review manually
      - dependency-name: "@stellar/stellar-sdk"
        update-types: ["version-update:semver-major"]
      # ESLint 9+ requires migrating .eslintrc.json to flat config
      # (eslint.config.js) before it can be safely bumped — do that
      # migration deliberately, not via an auto-merged Dependabot PR.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-major"]
      # TypeScript 7.0 (GA July 2026) is a Go-native compiler rewrite that
      # ships without a stable programmatic API — ts-jest and
      # @typescript-eslint both depend on that API and are expected to
      # break until they ship 7.x-compatible releases. Hold major bumps
      # here until those consumers confirm support.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
